databases:
  - name: operation-acier-db
    databaseName: operation_acier
    user: operation_acier

services:
  - type: web
    name: operation-acier
    env: node
    plan: free
    nodeVersion: 20
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: operation-acier-db
          property: connectionString